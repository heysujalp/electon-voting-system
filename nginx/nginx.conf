# ─── ElectON v2 — Nginx Production Configuration ────────────────
# Mounted at /etc/nginx/conf.d/default.conf by docker-compose
# Activated via:
#   docker compose --profile production up -d

# Rate limiting zones (shared memory)
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=sse:10m rate=2r/s;

# Hide nginx version in responses
server_tokens off;

upstream django {
    server web:8000;
}

# ─── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name electon.app www.electon.app;

    # Let's Encrypt challenge (certbot/webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server block ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name electon.app www.electon.app;

    # TLS certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/electon.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/electon.app/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # Max upload size (for voter CSV / candidate images)
    client_max_body_size 10M;

    # ─── Static files (served by nginx, not Django) ──────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Media files ─────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── SSE endpoints (long-lived connections, separate limit) ──
    location ~ ^/elections/.*/stream/ {
        limit_req zone=sse burst=5 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3700s;
        limit_conn_status 429;
    }

    # ─── API endpoints (stricter rate limit) ─────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── Login / auth endpoints (tight rate limit) ───────────────
    location ~ ^/(accounts/login|accounts/register|voter/) {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── All other requests → Django ─────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── Health check (no rate limit) ────────────────────────────
    location = /api/health/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Block dot-files ─────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
