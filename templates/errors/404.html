{% extends "base.html" %}
{% load static %}

{% block title %}Page Not Found{% endblock %}

{% block extra_styles %}
<link rel="stylesheet" href="{% static 'css/errors/error.css' %}">
{% endblock %}

{% block content %}
<div class="error-wrapper">
    <div class="error-card">
        <div class="error-code error-code-404">404</div>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-description">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{% url 'public_home' %}" class="btn btn-apple-blue">
            <i class="fas fa-home me-2"></i>Go Home
        </a>
    </div>
</div>
{% endblock %}
