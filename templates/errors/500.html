<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               display: flex; align-items: center; justify-content: center;
               min-height: 100vh; background: #f5f5f7; color: #1d1d1f; }
        .error-card { text-align: center; padding: 3rem 2rem; }
        .error-code { font-size: 6rem; font-weight: 700; color: #ff3b30; line-height: 1; }
        .error-title { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
        .error-desc { color: #6e6e73; margin-bottom: 2rem; }
        .btn { display: inline-block; padding: 0.75rem 2rem; background: #007aff;
               color: #fff; text-decoration: none; border-radius: 0.5rem;
               font-weight: 600; transition: background 0.2s; }
        .btn:hover { background: #005ecb; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">500</div>
        <h2 class="error-title">Something Went Wrong</h2>
        <p class="error-desc">We encountered an unexpected error. Our team has been notified.</p>
        <a href="/" class="btn">Go Home</a>
    </div>
</body>
</html>
