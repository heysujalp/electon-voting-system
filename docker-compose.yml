# ─── ElectON v2 — Docker Compose (Production) ───────────────────
# Optimized for DigitalOcean Basic Droplet (2 vCPU / 2 GB RAM / $18/mo)
#
# Usage:
#   docker compose up -d                        # core services
#   docker compose --profile production up -d    # + nginx with TLS

services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-electon}
      POSTGRES_USER: ${DB_USER:-electon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-electon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  # ─── Django App ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${DB_USER:-electon}:${DB_PASSWORD}@db:5432/${DB_NAME:-electon}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: electon.settings.production
      SITE_URL: https://electon.app
      ALLOWED_HOSTS: electon.app,www.electon.app
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Celery Worker ─────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${DB_USER:-electon}:${DB_PASSWORD}@db:5432/${DB_NAME:-electon}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: electon.settings.production
      SITE_URL: https://electon.app
      ALLOWED_HOSTS: electon.app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    command: ["celery", "-A", "electon", "worker",
              "--loglevel=info", "--concurrency=2",
              "-Q", "default,blockchain,emails"]
    deploy:
      resources:
        limits:
          memory: 384M

  # ─── Celery Beat (periodic tasks) ──────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${DB_USER:-electon}:${DB_PASSWORD}@db:5432/${DB_NAME:-electon}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: electon.settings.production
      SITE_URL: https://electon.app
      ALLOWED_HOSTS: electon.app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "electon", "beat",
              "--loglevel=info"]
    deploy:
      resources:
        limits:
          memory: 192M

  # ─── Nginx (production profile) ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    profiles:
      - production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 64M

  # ─── Certbot (TLS certificate renewal) ────────────────────────
  certbot:
    image: certbot/certbot
    profiles:
      - production
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  certbot_conf:
  certbot_www:
